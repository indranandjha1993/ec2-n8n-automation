---
name: Release

'on':
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible ansible-lint yamllint

      - name: Install Ansible collections
        run: |
          ansible-galaxy collection install community.general
          ansible-galaxy collection install community.postgresql
          ansible-galaxy collection install community.grafana

      - name: Run tests
        run: |
          yamllint .
          ansible-lint playbooks/

      - name: Generate changelog
        id: changelog
        run: |
          # Extract version from tag
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Generate changelog from git commits
          if [ $(git tag -l | wc -l) -gt 1 ]; then
            PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD~1)
            CHANGELOG=$(git log --pretty=format:"- %s" $PREVIOUS_TAG..HEAD)
          else
            CHANGELOG=$(git log --pretty=format:"- %s")
          fi

          # Save changelog to file
          echo "## Changes in $VERSION" > RELEASE_CHANGELOG.md
          echo "" >> RELEASE_CHANGELOG.md
          echo "$CHANGELOG" >> RELEASE_CHANGELOG.md

      - name: Create Release Archive
        run: |
          # Extract version from tag
          VERSION=${GITHUB_REF#refs/tags/}
          ARCHIVE_NAME="ec2-n8n-automation-$VERSION.tar.gz"

          # Create a temporary directory for clean archiving
          mkdir -p /tmp/release-archive

          # Copy files to temporary directory, excluding unwanted files
          rsync -av \
            --exclude='.git*' \
            --exclude='.idea' \
            --exclude='*.tar.gz' \
            --exclude='node_modules' \
            --exclude='.pytest_cache' \
            --exclude='__pycache__' \
            --exclude='.DS_Store' \
            --exclude='Thumbs.db' \
            . /tmp/release-archive/

          # Create archive from temporary directory
          cd /tmp/release-archive
          tar -czf "$GITHUB_WORKSPACE/$ARCHIVE_NAME" .

          # Move back to workspace
          cd "$GITHUB_WORKSPACE"

          # Verify archive was created
          ls -la "$ARCHIVE_NAME"
          echo "Archive created: $ARCHIVE_NAME"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_CHANGELOG.md
          files: |
            ec2-n8n-automation-*.tar.gz
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          token: ${{ secrets.GITHUB_TOKEN }}
