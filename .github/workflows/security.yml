---
name: Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run security scan weekly on Sundays at 2 AM UTC
    - cron: '0 2 * * 0'

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  security-scan:
    runs-on: ubuntu-latest
    name: Security Analysis

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install security scanning tools
        run: |
          pip install ansible-lint bandit safety
          ansible-galaxy collection install community.general \
            community.postgresql community.grafana

      - name: Run GitLeaks secret scan
        run: |
          # Install GitLeaks - use latest version
          GITLEAKS_VERSION="8.21.2"
          GITLEAKS_URL="https://github.com/gitleaks/gitleaks/releases/download"
          wget -q "${GITLEAKS_URL}/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf "gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          chmod +x gitleaks

          # Run GitLeaks scan with proper error handling
          echo "🔍 Running GitLeaks secret detection..."
          REPORT_PATH="gitleaks-report.json"
          if ./gitleaks detect --source . --config .gitleaks.toml \
             --verbose --no-git --report-format json --report-path "$REPORT_PATH"; then
            echo "✅ No secrets detected by GitLeaks"
          else
            GITLEAKS_EXIT_CODE=$?
            echo "⚠️ GitLeaks scan completed with exit code: $GITLEAKS_EXIT_CODE"

            if [ $GITLEAKS_EXIT_CODE -eq 1 ]; then
              echo "❌ GitLeaks found potential secrets!"
              if [ -f "$REPORT_PATH" ]; then
                echo "📋 GitLeaks findings:"
                if command -v jq >/dev/null 2>&1; then
                  cat "$REPORT_PATH" | jq -r \
                    '.[] | "File: \(.File) | Line: \(.StartLine) | Rule: \(.RuleID)"'
                else
                  cat "$REPORT_PATH"
                fi
              fi
              echo ""
              echo "🔧 To fix these issues:"
              echo "1. Remove any hardcoded secrets from the code"
              echo "2. Use environment variables or Ansible Vault for sensitive data"
              echo "3. Add false positives to .gitleaks.toml allowlist if needed"
              exit 1
            elif [ $GITLEAKS_EXIT_CODE -eq 8 ]; then
              echo "⚠️ GitLeaks configuration or runtime error"
              echo "This might be due to configuration issues or file access problems"
              echo "Continuing with other security checks..."
            else
              echo "⚠️ GitLeaks exited with unexpected code: $GITLEAKS_EXIT_CODE"
              echo "Continuing with other security checks..."
            fi
          fi

      - name: Ansible security-focused scan
        run: |
          echo "🔍 Running Ansible security checks..."

          # Run ansible-lint with focus on security issues only
          echo "Running ansible-lint for security issues..."
          # Use basic profile and focus on security-related rules only
          if ansible-lint playbooks/ --profile=basic \
             --skip-list=jinja,fqcn,name,risky-file-permissions,var-naming \
             --skip-list=no-changed-when,partial-become,ignore-errors \
             --skip-list=command-instead-of-module,command-instead-of-shell \
             --skip-list=risky-shell-pipe 2>/dev/null; then
            echo "✅ No critical Ansible security issues found"
          else
            echo "⚠️ Some Ansible linting issues found, but continuing with security checks..."
            echo "Note: Formatting issues (jinja spacing, FQCN) don't affect security"
          fi

          # Check for hardcoded passwords (excluding Ansible password generation)
          echo "Checking for hardcoded passwords..."
          HARDCODED_FOUND=false
          
          # Look for password assignments but exclude legitimate Ansible patterns
          if grep -r "password.*=" roles/ playbooks/ --include="*.yml" \
             --include="*.yaml" 2>/dev/null | \
             grep -v "password.*{{" | \
             grep -v "password.*\[\]" | \
             grep -v "password.*\"\"" | \
             grep -v "password.*\[generated\]" | \
             grep -v "password.*\[auto-generated\]" | \
             grep -v "password.*changeme" | \
             grep -v "password.*example" | \
             grep -v "lookup('password'" | \
             grep -v "lookup(\"password\"" | \
             grep -v "default(lookup" | \
             grep -v "password.*null" | \
             grep -v "password.*''" | \
             grep -v "#.*password" > /tmp/password_check.txt; then
            
            if [ -s /tmp/password_check.txt ]; then
              echo "❌ WARNING: Potential hardcoded passwords found!"
              cat /tmp/password_check.txt
              echo ""
              echo "Please use variables or Ansible Vault for sensitive data."
              HARDCODED_FOUND=true
            fi
          fi
          
          if [ "$HARDCODED_FOUND" = false ]; then
            echo "✅ No hardcoded passwords found"
            echo "Note: Ansible password generation functions (lookup('password')) are acceptable"
          else
            exit 1
          fi

          # Check for insecure permissions
          echo "Checking for insecure file permissions..."
          if grep -r "mode.*777\|mode.*666" roles/ playbooks/ \
             --include="*.yml" --include="*.yaml" 2>/dev/null; then
            echo "❌ WARNING: Insecure file permissions found!"
            echo "Avoid using 777 or 666 permissions."
            exit 1
          else
            echo "✅ No insecure permissions found"
          fi

          # Check for potential command injection
          echo "Checking for potential command injection..."
          if grep -r "shell.*{{.*}}" roles/ playbooks/ --include="*.yml" \
             --include="*.yaml" 2>/dev/null | grep -v "quote" | grep -v "shell_escape"; then
            echo "⚠️  WARNING: Potential command injection vulnerabilities found!"
            echo "Review shell commands with variables for proper escaping"
            echo "Consider using 'quote' filter: {{ variable | quote }}"
            # Don't exit here as this might be acceptable in some cases
          else
            echo "✅ No obvious command injection patterns found"
          fi

          # Check for HTTP URLs (should use HTTPS)
          echo "Checking for insecure HTTP URLs..."
          if grep -r "http://" roles/ playbooks/ --include="*.yml" \
             --include="*.yaml" 2>/dev/null | grep -v "http://localhost" | \
             grep -v "http://127.0.0.1" | grep -v "http://your-ec2-ip" | \
             grep -v "http://demo-ip" | grep -v "example.com"; then
            echo "⚠️  WARNING: HTTP URLs found. Consider using HTTPS where possible."
            # Don't exit here as HTTP might be acceptable for internal services
          else
            echo "✅ No insecure HTTP URLs found"
          fi

          echo "🎉 Ansible security scan completed!"

      - name: Check for common security issues
        run: |
          echo "🔍 Running additional security checks..."

          # Check for TODO/FIXME comments that might indicate security issues
          echo "Checking for security-related TODOs..."
          if grep -r "TODO.*security\|FIXME.*security\|TODO.*password\|FIXME.*password" \
             . --include="*.yml" --include="*.yaml" --include="*.py" \
             --include="*.sh" 2>/dev/null; then
            echo "⚠️  Found security-related TODOs. Please review and address them."
          else
            echo "✅ No security-related TODOs found"
          fi

          # Check for debug statements that might leak information
          echo "Checking for debug statements..."
          if grep -r "debug.*password\|debug.*secret\|debug.*key" roles/ playbooks/ \
             --include="*.yml" --include="*.yaml" 2>/dev/null | \
             grep -v "debug.*{{.*}}" | grep -v "example"; then
            echo "❌ WARNING: Debug statements with sensitive data found!"
            exit 1
          else
            echo "✅ No sensitive debug statements found"
          fi

          # Check for common insecure patterns
          echo "Checking for insecure patterns..."
          INSECURE_PATTERNS=0

          # Check for weak SSL/TLS configurations
          if grep -r "ssl_verify.*false\|verify_ssl.*false" roles/ playbooks/ \
             --include="*.yml" --include="*.yaml" 2>/dev/null; then
            echo "⚠️  WARNING: SSL verification disabled found"
            INSECURE_PATTERNS=1
          fi

          # Check for default credentials (excluding examples)
          if grep -r "admin.*admin\|root.*root" roles/ playbooks/ \
             --include="*.yml" --include="*.yaml" 2>/dev/null | \
             grep -v "# " | grep -v "example" | grep -v "changeme"; then
            echo "⚠️  WARNING: Potential default credentials found"
            INSECURE_PATTERNS=1
          fi

          # Check for unencrypted sensitive files
          echo "Checking for potentially sensitive unencrypted files..."
          if find . -name "*.key" -o -name "*.pem" -o -name "*_rsa" -o -name "*.p12" \
             -o -name "*.pfx" 2>/dev/null | grep -v ".git" | head -5; then
            echo "⚠️  WARNING: Potential private key files found"
            echo "Ensure these are properly secured and not committed to version control"
          fi

          if [ $INSECURE_PATTERNS -eq 0 ]; then
            echo "✅ No common insecure patterns found"
          fi

          echo "🎉 Security checks completed successfully!"

      - name: Upload GitLeaks results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          retention-days: 30
