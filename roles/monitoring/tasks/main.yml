---
- name: Create prometheus user
  user:
    name: prometheus
    system: yes
    shell: /bin/false
    home: /var/lib/prometheus
    create_home: no
  tags: [monitoring, prometheus]

- name: Create prometheus directories
  file:
    path: "{{ item }}"
    state: directory
    owner: prometheus
    group: prometheus
    mode: '0755'
  loop:
    - /etc/prometheus
    - /var/lib/prometheus
  tags: [monitoring, prometheus]

- name: Download and install Prometheus
  unarchive:
    src: "https://github.com/prometheus/prometheus/releases/download/v2.45.0/prometheus-2.45.0.linux-amd64.tar.gz"
    dest: /tmp
    remote_src: yes
    creates: /tmp/prometheus-2.45.0.linux-amd64
  tags: [monitoring, prometheus]

- name: Copy Prometheus binaries
  copy:
    src: "/tmp/prometheus-2.45.0.linux-amd64/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    owner: prometheus
    group: prometheus
    mode: '0755'
    remote_src: yes
  loop:
    - prometheus
    - promtool
  tags: [monitoring, prometheus]

- name: Create Prometheus configuration
  template:
    src: prometheus.yml.j2
    dest: /etc/prometheus/prometheus.yml
    owner: prometheus
    group: prometheus
    mode: '0644'
  notify: restart prometheus
  tags: [monitoring, prometheus, config]

- name: Create Prometheus systemd service
  template:
    src: prometheus.service.j2
    dest: /etc/systemd/system/prometheus.service
  notify:
    - reload systemd
    - restart prometheus
  tags: [monitoring, prometheus]

- name: Download and install Node Exporter
  unarchive:
    src: "https://github.com/prometheus/node_exporter/releases/download/v1.6.0/node_exporter-1.6.0.linux-amd64.tar.gz"
    dest: /tmp
    remote_src: yes
    creates: /tmp/node_exporter-1.6.0.linux-amd64
  tags: [monitoring, node_exporter]

- name: Copy Node Exporter binary
  copy:
    src: "/tmp/node_exporter-1.6.0.linux-amd64/node_exporter"
    dest: "/usr/local/bin/node_exporter"
    owner: prometheus
    group: prometheus
    mode: '0755'
    remote_src: yes
  tags: [monitoring, node_exporter]

- name: Create Node Exporter systemd service
  template:
    src: node_exporter.service.j2
    dest: /etc/systemd/system/node_exporter.service
  notify:
    - reload systemd
    - restart node_exporter
  tags: [monitoring, node_exporter]

- name: Download and install Grafana
  get_url:
    url: "https://dl.grafana.com/enterprise/release/grafana-enterprise_10.0.0_amd64.deb"
    dest: /tmp/grafana.deb
  tags: [monitoring, grafana]

- name: Install Grafana
  apt:
    deb: /tmp/grafana.deb
    state: present
  tags: [monitoring, grafana]

- name: Configure Grafana
  template:
    src: grafana.ini.j2
    dest: /etc/grafana/grafana.ini
    owner: root
    group: grafana
    mode: '0640'
  notify: restart grafana
  tags: [monitoring, grafana, config]

- name: Start and enable monitoring services
  systemd:
    name: "{{ item }}"
    state: started
    enabled: yes
    daemon_reload: yes
  loop:
    - prometheus
    - node_exporter
    - grafana-server
  tags: [monitoring]

- name: Wait for Grafana to be ready
  uri:
    url: "http://localhost:{{ monitoring.grafana.port }}/api/health"
    method: GET
  register: grafana_health
  until: grafana_health.status == 200
  retries: 30
  delay: 5
  tags: [monitoring, grafana]

- name: Configure Grafana datasources
  uri:
    url: "http://localhost:{{ monitoring.grafana.port }}/api/datasources"
    method: POST
    user: "{{ monitoring.grafana.admin_user }}"
    password: "{{ monitoring.grafana.admin_password }}"
    force_basic_auth: yes
    body_format: json
    body:
      name: "Prometheus"
      type: "prometheus"
      url: "http://localhost:{{ monitoring.prometheus.port }}"
      access: "proxy"
      isDefault: true
    status_code: [200, 409]  # 409 if already exists
  tags: [monitoring, grafana, config]
