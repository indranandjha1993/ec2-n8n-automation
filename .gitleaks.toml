# GitLeaks configuration for n8n deployment automation

title = "GitLeaks Config for n8n Deployment"

[extend]
# Extend default rules
useDefault = true

[[rules]]
id = "ansible-vault-password"
description = "Ansible Vault Password"
regex = '''vault_password\s*=\s*['""][^'""]+['""]'''
tags = ["ansible", "password"]

[[rules]]
id = "database-password"
description = "Database Password"
regex = '''(?i)(db_password|database_password|postgres_password)\s*[:=]\s*['""][^'""]+['""]'''
tags = ["database", "password"]

[[rules]]
id = "api-key"
description = "API Key"
regex = '''(?i)(api_key|apikey|api-key)\s*[:=]\s*['""][^'""]+['""]'''
tags = ["api", "key"]

[[rules]]
id = "private-key"
description = "Private Key"
regex = '''-----BEGIN\s+(RSA\s+)?PRIVATE KEY-----'''
tags = ["private", "key"]

[[rules]]
id = "aws-access-key"
description = "AWS Access Key"
regex = '''AKIA[0-9A-Z]{16}'''
tags = ["aws", "key"]

[[rules]]
id = "aws-secret-key"
description = "AWS Secret Key"
regex = '''(?i)aws_secret_access_key\s*[:=]\s*['""][^'""]+['""]'''
tags = ["aws", "secret"]

# Allowlist for false positives
[[allowlist]]
description = "Example configurations"
regex = '''example\.com|your-domain\.com|your-ec2-ip|admin@example\.com'''

[[allowlist]]
description = "Template variables"
regex = '''\{\{.*\}\}'''

[[allowlist]]
description = "Documentation examples"
regex = '''password.*=.*\[generated\]'''

[[allowlist]]
description = "Placeholder values"
regex = '''password.*=.*""'''

[[allowlist]]
description = "Default example values"
regex = '''admin@example\.com|your-key\.pem|your-backup-bucket'''

# File patterns to ignore
[[allowlist]]
description = "Documentation files"
paths = [
  '''.*\.md$''',
  '''.*\.rst$''',
  '''.*\.txt$''',
  '''CHANGELOG.*''',
  '''LICENSE.*'''
]

[[allowlist]]
description = "Configuration examples"
paths = [
  '''.*\.example$''',
  '''.*\.sample$''',
  '''.*\.template$'''
]
