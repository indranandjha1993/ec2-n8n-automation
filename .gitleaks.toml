# GitLeaks configuration for n8n deployment automation

title = "GitLeaks Config for n8n Deployment"

[extend]
# Extend default rules
useDefault = true

[[rules]]
id = "ansible-vault-password"
description = "Ansible Vault Password"
regex = '''vault_password\s*=\s*['""][^'""]+['""]'''
tags = ["ansible", "password"]

[[rules]]
id = "database-password"
description = "Database Password"
regex = '''(?i)(db_password|database_password|postgres_password)\s*[:=]\s*['""][a-zA-Z0-9!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]{8,}['""]'''
tags = ["database", "password"]

[[rules]]
id = "api-key"
description = "API Key"
regex = '''(?i)(api_key|apikey|api-key)\s*[:=]\s*['""][a-zA-Z0-9]{16,}['""]'''
tags = ["api", "key"]

[[rules]]
id = "private-key"
description = "Private Key"
regex = '''-----BEGIN\s+(RSA\s+)?PRIVATE KEY-----'''
tags = ["private", "key"]

[[rules]]
id = "aws-access-key"
description = "AWS Access Key"
regex = '''AKIA[0-9A-Z]{16}'''
tags = ["aws", "key"]

[[rules]]
id = "aws-secret-key"
description = "AWS Secret Key"
regex = '''(?i)aws_secret_access_key\s*[:=]\s*['""][a-zA-Z0-9/+=]{40}['""]'''
tags = ["aws", "secret"]

# Comprehensive allowlist for false positives
[[allowlist]]
description = "Example configurations and placeholders"
regexTarget = "match"
regex = '''example\.com|your-domain\.com|your-ec2-ip|admin@example\.com|yourdomain\.com|demo\.com'''

[[allowlist]]
description = "Template variables and Ansible syntax"
regexTarget = "match"
regex = '''\{\{.*\}\}|\[generated\]|\[auto-generated\]'''

[[allowlist]]
description = "Documentation examples and placeholders"
regexTarget = "match"
regex = '''password.*=.*""|password.*=.*\[\]|password.*=.*\[generated\]|password.*=.*\[auto-generated\]'''

[[allowlist]]
description = "Default example values and placeholders"
regexTarget = "match"
regex = '''admin@example\.com|your-key\.pem|your-backup-bucket|your-server-ip|localhost|127\.0\.0\.1'''

[[allowlist]]
description = "Common placeholder passwords"
regexTarget = "match"
regex = '''password.*=.*"changeme"|password.*=.*"password"|password.*=.*"admin"|password.*=.*"root"'''

[[allowlist]]
description = "Configuration file comments"
regexTarget = "match"
regex = '''^\s*#.*'''

[[allowlist]]
description = "YAML comments"
regexTarget = "match"
regex = '''^\s*#.*|.*#.*password.*example'''

# File patterns to ignore
[[allowlist]]
description = "Documentation files"
paths = [
  '''.*\.md$''',
  '''.*\.rst$''',
  '''.*\.txt$''',
  '''CHANGELOG.*''',
  '''LICENSE.*''',
  '''README.*'''
]

[[allowlist]]
description = "Configuration examples and templates"
paths = [
  '''.*\.example$''',
  '''.*\.sample$''',
  '''.*\.template$''',
  '''.*\.example\.yml$''',
  '''.*\.example\.yaml$'''
]

[[allowlist]]
description = "Git and CI files"
paths = [
  '''.git/.*''',
  '''.github/.*''',
  '''.*\.log$''',
  '''.*\.tmp$'''
]

[[allowlist]]
description = "Backup and temporary files"
paths = [
  '''.*\.bak$''',
  '''.*\.backup$''',
  '''.*\.swp$''',
  '''.*\.swo$''',
  '''.*~$'''
]

# Additional allowlist for specific content
[[allowlist]]
description = "Ansible variable syntax"
regexTarget = "match"
regex = '''password:\s*\{\{.*\}\}'''

[[allowlist]]
description = "Empty or placeholder values"
regexTarget = "match"
regex = '''password:\s*""|password:\s*''|password:\s*null'''

[[allowlist]]
description = "Documentation URLs"
regexTarget = "match"
regex = '''https://.*\.com|http://localhost|http://127\.0\.0\.1'''
